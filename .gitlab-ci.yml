stages:
  - test
  - release

# Run tests on merge requests, the default branch, and release tags.
# Release tags still gate on a passing test job (release stage runs after test).
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'
  script:
    - dotnet test BetterPosters.sln --configuration Release --verbosity normal

# On a SemVer tag: build + package with JPRM, attach the zip to a GitLab Release
# (with the changelog notes), then regenerate manifest.json and push it to the
# default branch. Ported from the former Forgejo release-jellyfin-plugin workflow.
release:
  stage: release
  image: mcr.microsoft.com/dotnet/sdk:9.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'
  variables:
    GIT_DEPTH: "0" # full history/tags, matching the Forgejo fetch-depth: 0
    PACKAGE_NAME: better-posters
  script:
    - apt-get update && apt-get install -y --no-install-recommends python3 python3-pip git curl jq
    - python3 -m pip install --break-system-packages jprm
    # Versions: X.Y.Z from the tag; X.Y.Z.0 for Jellyfin/JPRM.
    - VERSION="$CI_COMMIT_TAG"
    - PLUGIN_VERSION="${VERSION}.0"
    # Build + package the plugin zip.
    - rm -rf artifacts && mkdir -p artifacts
    - python3 -m jprm plugin build . --output artifacts --dotnet-configuration Release --version "$PLUGIN_VERSION" --dotnet-framework net9.0
    - ZIP_PATH="$(find artifacts -maxdepth 1 -type f -name '*.zip')"
    - ZIP_NAME="$(basename "$ZIP_PATH")"
    - md5sum "$ZIP_PATH" > "$ZIP_PATH.md5sum"
    - sha256sum "$ZIP_PATH" > "$ZIP_PATH.sha256sum"
    # Publish the zip (+ checksums) to the Generic Package Registry. This is the
    # backing store the Release asset links redirect to; it uses the built-in
    # CI_JOB_TOKEN and is never the user-facing URL.
    - PKG_BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${VERSION}"
    - |
      for f in "$ZIP_PATH" "$ZIP_PATH.md5sum" "$ZIP_PATH.sha256sum"; do
        curl --fail --silent --show-error \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$f" "$PKG_BASE/$(basename "$f")"
      done
    # Release notes for this version, extracted from CHANGELOG.md.
    - NOTES="$(python3 Scripts/changelog_notes.py "$VERSION")"
    # Create the Release and ATTACH the zip as an asset WITH a filepath, so GitLab
    # exposes a permanent, release-scoped download link on the release page.
    - |
      curl --fail --silent --show-error --request POST \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
                    --arg tag "$VERSION" \
                    --arg name "$VERSION" \
                    --arg desc "$NOTES" \
                    --arg url "$PKG_BASE/$ZIP_NAME" \
                    --arg aname "$ZIP_NAME" \
                    --arg fp "/$ZIP_NAME" \
                    '{tag_name:$tag, name:$name, description:$desc, assets:{links:[{name:$aname, url:$url, filepath:$fp, link_type:"package"}]}}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
    # Manifest sourceUrl = the permanent RELEASE download link (302 -> the asset).
    - PLUGIN_URL="${CI_PROJECT_URL}/-/releases/${VERSION}/downloads/${ZIP_NAME}"
    # Regenerate manifest.json on the tip of the default branch, then push it back.
    - git fetch origin "$CI_DEFAULT_BRANCH"
    - git checkout -B "$CI_DEFAULT_BRANCH" "origin/$CI_DEFAULT_BRANCH"
    - python3 -m jprm repo add --plugin-url "$PLUGIN_URL" ./manifest.json "$ZIP_PATH"
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@code.neureka.dev"
    - git add manifest.json
    - |
      if ! git diff --cached --quiet; then
        git commit -m "Update Jellyfin plugin manifest [skip ci]"
        git push -o ci.skip \
          "https://oauth2:${MANIFEST_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
          "HEAD:${CI_DEFAULT_BRANCH}"
      else
        echo "Manifest already up to date."
      fi
